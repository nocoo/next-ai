name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.1
    with:
      pre-command: "bun run build"
      test-command: "bun run test:coverage"
      typecheck-command: "bun run typecheck"
      enable-l2: "false"
    secrets: inherit

  e2e-examples:
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [next-app, vite-app]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
      - run: bun install
        working-directory: examples/${{ matrix.app }}
      - if: matrix.app == 'next-app'
        run: bun run build
        working-directory: examples/${{ matrix.app }}
      - run: bunx playwright install --with-deps chromium
        working-directory: examples/${{ matrix.app }}
      - run: bunx playwright test
        working-directory: examples/${{ matrix.app }}
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.app }}
          path: examples/${{ matrix.app }}/playwright-report
          retention-days: 7
